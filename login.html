<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Log in to your IronPulse account.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Login | IronPulse</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#EF4444',   /* Bold Red */
                        secondary: '#F97316', /* Vibrant Orange */
                        bgLight: '#FFFFFF',
                        bgDark: '#111827',    
                        cardLight: '#F9FAFB',
                        cardDark: '#1f2937',
                        textLight: '#111827',
                        textDark: '#F9FAFB'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    backgroundImage: {
                        'gradient-primary': 'linear-gradient(to right, #EF4444, #F97316)'
                    },
                    screens: {
                        'xs': '360px', 'sm': '390px', 'md': '768px', 
                        'lg': '1024px', 'xl': '1280px', '2xl': '1536px', 
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --bg-color: #FFFFFF;
            --text-color: #111827;
            --text-muted: #4B5563;
            --card-bg: #F9FAFB;
            --border-color: #E5E7EB;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --hover-highlight: #EF4444;
        }
        
        [data-theme="dark"], .dark {
            --bg-color: #111827;
            --text-color: #F9FAFB;
            --text-muted: #9CA3AF;
            --card-bg: #1f2937;
            --border-color: #374151;
            --nav-bg: rgba(17, 24, 39, 0.95);
            --hover-highlight: #EF4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
            font-weight: 400; 
        }

        /* Utility to temporarily disable transitions during RTL switch */
        .no-transition * {
            transition: none !important;
        }

        .text-body-muted { color: var(--text-muted); transition: color 0.3s ease; }
        .bg-card { background-color: var(--card-bg); border-color: var(--border-color); }
        .border-theme { border-color: var(--border-color); }

        /* Clean Navbar */
        .glass-nav {
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        /* Utilities */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #EF4444; }
        
        .utility-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 8px;
            border: 1px solid var(--border-color); background: var(--bg-color);
            color: var(--text-color); font-weight: 600; transition: all 0.2s ease; cursor: pointer;
        }
        .utility-btn:hover { border-color: var(--hover-highlight); color: var(--hover-highlight); background: var(--card-bg); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeInUp 0.8s ease-out;
        }
    </style>
</head>
<body class="antialiased font-sans h-screen overflow-hidden flex flex-col">

    <!-- RTL and Dark Mode Toggles -->
    <div class="fixed top-4 end-4 md:top-6 md:end-6 z-[100] flex items-center gap-3">
        <button type="button" class="rtl-toggle-btn utility-btn text-xs font-bold uppercase tracking-wider shadow-sm" title="Toggle RTL">
            RTL
        </button>
        <button type="button" class="theme-toggle utility-btn shadow-sm" title="Toggle Theme">
            <i class="fas fa-moon text-sm"></i>
        </button>
    </div>

    <!-- Glowing Orbs -->
    <div class="absolute top-20 start-10 w-72 h-72 bg-primary/10 rounded-full blur-3xl animate-pulse pointer-events-none z-0"></div>
    <div class="absolute bottom-20 end-10 w-96 h-96 bg-secondary/10 rounded-full blur-3xl animate-pulse pointer-events-none z-0" style="animation-delay: 1.5s;"></div>

    <!-- Main Content Area: Login Form -->
    <div class="flex-1 overflow-y-auto flex items-center justify-center p-4 pt-10 relative z-10">
        <div class="w-full max-w-[340px] bg-card border border-theme shadow-2xl p-5 md:p-6 animate-fade-in group rounded-3xl relative overflow-hidden z-10">
            
            <div class="absolute top-0 start-0 w-full h-1 bg-gradient-primary"></div>

            <div class="flex justify-center mb-2">
                <a href="index.html" class="flex items-center gap-2">
                    <i class="fas fa-dumbbell text-2xl text-primary drop-shadow-[0_2px_8px_rgba(239,68,68,0.4)]"></i>
                    <span class="text-xl font-black tracking-widest text-[var(--text-color)] uppercase whitespace-nowrap">Iron<span class="text-primary">Pulse</span></span>
                </a>
            </div>

            <div class="text-center mb-3">
                <h2 class="text-lg md:text-xl font-black text-[var(--text-color)] uppercase tracking-tight mb-2">Welcome Back.</h2>
                <p class="text-xs text-body-muted font-bold uppercase tracking-widest">Sign in to your account</p>
            </div>

            <form class="flex flex-col gap-2" onsubmit="handleLogin(event)">

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-[var(--text-muted)] mb-2">
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        required
                        placeholder="YOUR.EMAIL@EXAMPLE.COM"
                        class="w-full px-4 py-3 bg-[var(--bg-color)] border border-theme text-[var(--text-color)] text-xs font-bold focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary rounded-xl transition-all"
                    />
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-[var(--text-muted)] mb-2">
                        Password
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password"
                            required
                            placeholder="ENTER YOUR PASSWORD"
                            class="w-full px-4 py-2.5 bg-[var(--bg-color)] border border-theme text-[var(--text-color)] text-xs font-bold focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary rounded-xl transition-all"
                        />
                        <button 
                            type="button" 
                            onclick="togglePassword()"
                            class="absolute end-4 top-1/2 -translate-y-1/2 text-[var(--text-muted)] hover:text-primary transition-colors"
                        >
                            <i class="fas fa-eye text-sm" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-[10px] sm:text-xs pt-1">
                    <label class="flex items-center cursor-pointer group-checkbox">
                        <input type="checkbox" class="w-3 h-3 sm:w-4 sm:h-4 rounded border-theme text-primary focus:ring-primary bg-[var(--bg-color)]">
                        <span class="ms-2 text-body-muted font-bold uppercase tracking-widest">Remember me</span>
                    </label>
                    <span class="text-primary font-bold uppercase tracking-widest cursor-pointer hover:text-[var(--text-color)] transition-colors">
                        Forgot password?
                    </span>
                </div>

                <button 
                    type="submit"
                    class="w-full py-2.5 mt-2 bg-gradient-primary text-white font-bold uppercase tracking-widest text-xs transition-transform hover:scale-[1.02] flex items-center justify-center gap-2 rounded-full shadow-lg shadow-primary/30"
                >
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right text-[10px] rtl:rotate-180"></i>
                </button>

                <div class="relative my-3">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-theme"></div>
                    </div>
                    <div class="relative flex justify-center text-[10px] uppercase tracking-widest font-bold">
                        <span class="px-3 bg-card text-[var(--text-muted)]">Or Continue With</span>
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button 
                        type="button"
                        class="flex items-center justify-center w-full px-4 py-2.5 border border-theme hover:border-primary transition-colors bg-[var(--bg-color)] rounded-full gap-2 shadow-sm"
                    >
                        <svg class="w-4 h-4" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-[var(--text-color)]">Google</span>
                    </button>

                    <button 
                        type="button"
                        class="flex items-center justify-center w-full px-4 py-2.5 border border-theme hover:border-primary transition-colors bg-[var(--bg-color)] rounded-full gap-2 shadow-sm"
                    >
                        <i class="fab fa-apple text-base text-[var(--text-color)]"></i>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-[var(--text-color)]">Apple</span>
                    </button>
                </div>

            </form>

            <div class="mt-4 text-center text-[10px] sm:text-xs font-bold uppercase tracking-widest text-body-muted">
                No Account? 
                <a href="register.html" class="text-primary hover:text-[#DC2626] transition-colors ms-1 border-b border-primary pb-0.5">
                    Sign Up
                </a>
            </div>

        </div>
    </div>

    <script>
        // --- Password Visibility Toggle ---
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // --- Handle Login Submission ---
        function handleLogin(event) {
            event.preventDefault();

            const button = event.target.querySelector('button[type="submit"]');
            const icon = button.querySelector('i');
            const span = button.querySelector('span');
            
            icon.className = 'fas fa-spinner fa-spin';
            span.innerText = 'AUTHENTICATING...';
            button.disabled = true;
            button.classList.add('opacity-50', 'cursor-not-allowed');

            setTimeout(() => {
                window.location.href = 'dashboard-user.html';
            }, 1500);
        }

        // --- Standard Theme Toggle Logic ---
        const htmlElement = document.documentElement;
        const themeToggleBtns = document.querySelectorAll('.theme-toggle');

        function updateTheme() {
            const isDark = htmlElement.classList.contains('dark');
            htmlElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeToggleBtns.forEach(btn => {
                const icon = btn.querySelector('i');
                if (icon) {
                    if (isDark) {
                        icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
                    } else {
                        icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
                    }
                }
            });
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        themeToggleBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation(); 
                htmlElement.classList.toggle('dark');
                updateTheme();
            });
        });

        // Initialize Light mode explicitly unless specified in local storage as dark
        if (localStorage.getItem('theme') === 'dark') {
            htmlElement.classList.add('dark');
        } else {
            htmlElement.classList.remove('dark');
        }
        updateTheme();

        // --- Standard RTL Toggle Logic ---
        const rtlToggleBtns = document.querySelectorAll('.rtl-toggle-btn');
        rtlToggleBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation(); 
                
                document.body.classList.add('no-transition');
                
                const currentDir = htmlElement.getAttribute('dir');
                htmlElement.setAttribute('dir', currentDir === 'ltr' ? 'rtl' : 'ltr');
                
                setTimeout(() => {
                    document.body.classList.remove('no-transition');
                }, 50);
            });
        });

        // --- Navbar Scroll Effect removed ---
    </script>
</body>
</html>
